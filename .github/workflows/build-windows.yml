name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    paths:
      - 'desktop_app/**'
      - 'comparator.py'
      - 'utils.py'
      - 'constants.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r desktop_app/requirements_desktop.txt
    
    - name: Build EXE
      run: |
        cd desktop_app
        pyinstaller `
          --name="SERP Comparator" `
          --onefile `
          --windowed `
          --clean `
          --noconfirm `
          --add-data "../comparator.py;." `
          --add-data "../utils.py;." `
          --add-data "../constants.py;." `
          --hidden-import pandas `
          --hidden-import openpyxl `
          --hidden-import matplotlib.backends.backend_qt5agg `
          --hidden-import PyQt6.QtCore `
          --hidden-import PyQt6.QtGui `
          --hidden-import PyQt6.QtWidgets `
          --exclude-module tkinter `
          --exclude-module unittest `
          --exclude-module pytest `
          desktop_app.py
    
    - name: Create Portable Package
      run: |
        cd desktop_app
        mkdir -p "dist/SERP Comparator Portable"
        copy "dist/SERP Comparator.exe" "dist/SERP Comparator Portable/"
        copy DESKTOP_README.md "dist/SERP Comparator Portable/README.md"
        copy setup_windows.bat "dist/SERP Comparator Portable/"
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: SERP-Comparator-Windows
        path: desktop_app/dist/
    
    - name: Create Release ZIP
      run: |
        cd desktop_app/dist
        7z a -tzip "../../SERP_Comparator_Windows.zip" "SERP Comparator Portable/"
    
    - name: Upload Release ZIP
      uses: actions/upload-artifact@v3
      with:
        name: SERP-Comparator-Release-ZIP
        path: SERP_Comparator_Windows.zip
